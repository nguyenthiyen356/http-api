apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quote-api
  namespace: argocd
  # Clean up all managed resources when this Application is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/nguyenthiyen356/http-api.git
    targetRevision: HEAD
    path: charts/quote-api
    helm:
      # Image tag is patched by 20-deploy.sh to the current git SHA.
      # __IMAGE_TAG__ is replaced by sed in the deploy script.
      parameters:
        - name: image.tag
          value: "__IMAGE_TAG__"

  destination:
    server: https://kubernetes.default.svc
    namespace: quote-api

  syncPolicy:
    automated:
      prune: true      # remove resources deleted from git
      selfHeal: true   # revert manual changes
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
