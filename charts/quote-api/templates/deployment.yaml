apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      
      # --- PLACEMENT POLICY ---
      affinity:
        nodeAffinity:
          # 1. Isolate the deployment to only touch your designated nodes
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.placement.nodeLabelKey }}
                operator: In
                values:
                  - {{ .Values.placement.spotValue }}
                  - {{ .Values.placement.onDemandValue }}
          
          # 2. Tie-breaker to ensure spot gets 2 pods and on-demand gets 1 pod
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: {{ .Values.placement.nodeLabelKey }}
                operator: In
                values:
                - {{ .Values.placement.spotValue }}

      topologySpreadConstraints:
        # Constraint A: Ensures that the 3 pods are spread across spot and on-demand nodes
        - maxSkew: 1
          topologyKey: {{ .Values.placement.nodeLabelKey }}
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: {{ .Release.Name }}

        # Constraint B: Spreads the 2 spot pods across separate machines if both are alive
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway # Soft rule: allows stacking if a spot node dies
          labelSelector:
            matchLabels:
              app: quote-api
      # ------------------------

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          
          # RootFS is read-only. Writable emptyDir spaces provide temporary runtime system operations.
          volumeMounts:
            - mountPath: /tmp
              name: ephemeral-storage
      volumes:
        - name: ephemeral-storage
          emptyDir: {}
